<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demande de devis Lilicleanservice</title>
    <style>
      :root {
        --blue: #2f80ed;
        --blue-dark: #1557b0;
        --text: #1f2937;
        --muted: #64748b;
        --line: #d8e7fb;
        --bg: #f4f9ff;
        --white: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          "Avenir Next", "Avenir", "Segoe UI", "Helvetica Neue", Arial,
          sans-serif;
      }

      .quote-section {
        display: flex;
        justify-content: center;
        padding: 48px 16px;
      }

      .quote-form {
        width: 100%;
        max-width: 560px;
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: var(--white);
        box-shadow: 0 22px 70px rgba(47, 128, 237, 0.14);
      }

      h2 {
        margin: 0 0 8px;
        color: var(--blue-dark);
        font-size: clamp(28px, 5vw, 40px);
        line-height: 1.1;
      }

      .intro {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.6;
      }

      .quote-field {
        margin-bottom: 18px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: rgba(31, 41, 55, 0.82);
        font-size: 14px;
        font-weight: 700;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--white);
        color: var(--text);
        font: inherit;
        font-size: 15px;
        padding: 14px 16px;
        outline: none;
      }

      textarea {
        min-height: 112px;
        resize: vertical;
      }

      input:focus,
      textarea:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 4px rgba(47, 128, 237, 0.14);
      }

      .quote-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 48px;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--blue), var(--blue-dark));
        color: var(--white);
        cursor: pointer;
        font-size: 15px;
        font-weight: 800;
        padding: 14px 28px;
        box-shadow: 0 16px 34px rgba(47, 128, 237, 0.28);
      }

      .form-message {
        margin: 0 0 18px;
        border-radius: 16px;
        padding: 12px 14px;
        font-size: 14px;
        line-height: 1.5;
      }

      .form-message.success {
        border: 1px solid rgba(39, 174, 96, 0.24);
        background: rgba(39, 174, 96, 0.1);
        color: #1557b0;
      }

      .form-message.error {
        border: 1px solid rgba(220, 38, 38, 0.22);
        background: #fef2f2;
        color: #991b1b;
      }

      @media (max-width: 640px) {
        .quote-section {
          padding: 28px 12px;
        }

        .quote-form {
          padding: 22px;
        }
      }
    </style>
  </head>
  <body>
    <section class="quote-section">
      <form class="quote-form" id="quoteForm">
        <h2>Demande rapide</h2>
        <p class="intro">
          Laissez votre nom, votre téléphone et votre besoin. Nous vous rappelons rapidement.
        </p>

        <div class="quote-field">
          <label for="fullName">Nom</label>
          <input id="fullName" name="fullName" autocomplete="name" required />
        </div>

        <div class="quote-field">
          <label for="phone">Téléphone</label>
          <input id="phone" name="phone" type="tel" autocomplete="tel" required />
        </div>

        <div class="quote-field">
          <label for="message">Besoin</label>
          <textarea
            id="message"
            name="message"
            placeholder="Ex. ménage, vitres, grand nettoyage..."
          ></textarea>
        </div>

        <button class="quote-button" type="submit">Envoyer ma demande</button>
      </form>
    </section>

    <script>
      const form = document.getElementById("quoteForm");

      function value(id) {
        return document.getElementById(id).value.trim();
      }

      function showMessage(type, text) {
        const oldMessage = form.querySelector(".form-message");

        if (oldMessage) {
          oldMessage.remove();
        }

        const message = document.createElement("p");
        message.className = "form-message " + type;
        message.textContent = text;
        message.setAttribute("aria-live", "polite");
        form.insertBefore(message, form.querySelector(".quote-button"));
      }

      form.addEventListener("submit", async function (event) {
        event.preventDefault();

        const payload = {
          full_name: value("fullName"),
          phone: value("phone"),
          message: value("message")
        };

        console.log("[StaticLeadForm] Donnees envoyees :", payload);

        try {
          const response = await fetch("/api/contacts", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });
          const result = await response.json();

          console.log("[StaticLeadForm] Reponse serveur :", {
            status: response.status,
            ok: response.ok,
            result
          });

          if (!response.ok || !result.success) {
            throw new Error(
              result.message || "Une erreur est survenue. Merci de réessayer dans un instant."
            );
          }

          showMessage(
            "success",
            result.message || "Merci pour votre demande. Nous vous recontactons rapidement."
          );
          form.reset();
        } catch (error) {
          console.error("[StaticLeadForm] Echec de l'envoi :", error);
          showMessage(
            "error",
            error instanceof Error
              ? error.message
              : "Une erreur est survenue. Merci de réessayer dans un instant."
          );
        }
      });
    </script>
  </body>
</html>
