<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demande de devis Lilicleanservice</title>
    <style>
      :root {
        --blue: #2f80ed;
        --blue-dark: #1557b0;
        --green: #27ae60;
        --text: #1f2937;
        --muted: #64748b;
        --line: #d8e7fb;
        --bg: #f4f9ff;
        --white: #ffffff;
        --error: #dc2626;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          "Avenir Next", "Avenir", "Segoe UI", "Helvetica Neue", Arial,
          sans-serif;
      }

      .quote-section {
        display: flex;
        justify-content: center;
        padding: 48px 16px;
      }

      .quote-form {
        width: 100%;
        max-width: 760px;
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: var(--white);
        box-shadow: 0 22px 70px rgba(47, 128, 237, 0.14);
      }

      h2 {
        margin: 0 0 8px;
        color: var(--blue-dark);
        font-size: clamp(28px, 5vw, 40px);
        line-height: 1.1;
      }

      .intro {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.6;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .field {
        margin-bottom: 18px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: rgba(31, 41, 55, 0.82);
        font-size: 14px;
        font-weight: 700;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--white);
        color: var(--text);
        font: inherit;
        font-size: 15px;
        padding: 14px 16px;
        outline: none;
      }

      textarea {
        min-height: 144px;
        resize: vertical;
      }

      input:focus,
      textarea:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 4px rgba(47, 128, 237, 0.14);
      }

      .error-text {
        display: none;
        margin: 8px 0 0;
        color: var(--error);
        font-size: 13px;
        line-height: 1.4;
      }

      .field.error input,
      .field.error textarea {
        border-color: var(--error);
      }

      .field.error .error-text {
        display: block;
      }

      .form-message {
        margin: 0 0 18px;
        border-radius: 16px;
        padding: 12px 14px;
        font-size: 14px;
        line-height: 1.5;
      }

      .form-message.success {
        border: 1px solid rgba(39, 174, 96, 0.24);
        background: rgba(39, 174, 96, 0.1);
        color: #1557b0;
      }

      .form-message.error {
        border: 1px solid rgba(220, 38, 38, 0.22);
        background: #fef2f2;
        color: #991b1b;
      }

      .quote-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 48px;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--blue), var(--blue-dark));
        color: var(--white);
        cursor: pointer;
        font-size: 15px;
        font-weight: 800;
        padding: 14px 28px;
        box-shadow: 0 16px 34px rgba(47, 128, 237, 0.28);
      }

      .quote-button:disabled {
        cursor: not-allowed;
        opacity: 0.7;
      }

      @media (max-width: 640px) {
        .quote-section {
          padding: 28px 12px;
        }

        .quote-form {
          padding: 22px;
        }

        .grid {
          grid-template-columns: 1fr;
          gap: 0;
        }
      }
    </style>
  </head>
  <body>
    <section class="quote-section">
      <form class="quote-form" id="quoteForm" novalidate>
        <h2>Demande de devis</h2>
        <p class="intro">
          Remplissez vos coordonnées et votre besoin. Nous vous recontactons rapidement.
        </p>

        <div class="grid">
          <div class="field" data-field="first_name">
            <label for="firstName">Prénom</label>
            <input id="firstName" name="first_name" autocomplete="given-name" />
            <p class="error-text"></p>
          </div>

          <div class="field" data-field="last_name">
            <label for="lastName">Nom</label>
            <input id="lastName" name="last_name" autocomplete="family-name" />
            <p class="error-text"></p>
          </div>
        </div>

        <div class="grid">
          <div class="field" data-field="email">
            <label for="email">Adresse email</label>
            <input id="email" name="email" type="email" autocomplete="email" />
            <p class="error-text"></p>
          </div>

          <div class="field" data-field="phone">
            <label for="phone">Numéro de téléphone</label>
            <input id="phone" name="phone" type="tel" autocomplete="tel" />
            <p class="error-text"></p>
          </div>
        </div>

        <div class="field" data-field="address">
          <label for="address">Adresse postale</label>
          <input id="address" name="address" autocomplete="street-address" />
          <p class="error-text"></p>
        </div>

        <div class="field" data-field="message">
          <label for="message">Votre besoin</label>
          <textarea
            id="message"
            name="message"
            placeholder="Décrivez la prestation souhaitée, la surface, vos disponibilités ou le niveau d'urgence."
          ></textarea>
          <p class="error-text"></p>
        </div>

        <button class="quote-button" type="submit">Envoyer la demande</button>
      </form>
    </section>

    <script>
      const form = document.getElementById("quoteForm");
      const button = form.querySelector(".quote-button");

      function value(name) {
        return form.elements[name].value.trim();
      }

      function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      }

      function clearErrors() {
        form.querySelectorAll(".field").forEach(function (field) {
          field.classList.remove("error");
          field.querySelector(".error-text").textContent = "";
        });
      }

      function setError(name, text) {
        const field = form.querySelector('[data-field="' + name + '"]');

        field.classList.add("error");
        field.querySelector(".error-text").textContent = text;
      }

      function showMessage(type, text) {
        const oldMessage = form.querySelector(".form-message");

        if (oldMessage) {
          oldMessage.remove();
        }

        const message = document.createElement("p");
        message.className = "form-message " + type;
        message.textContent = text;
        message.setAttribute("aria-live", "polite");
        form.insertBefore(message, button);
      }

      function validate(payload) {
        const errors = {};

        if (!payload.first_name) errors.first_name = "Merci d'indiquer votre prénom.";
        if (!payload.last_name) errors.last_name = "Merci d'indiquer votre nom.";
        if (!payload.email) errors.email = "Merci d'indiquer votre adresse email.";
        else if (!isValidEmail(payload.email)) {
          errors.email = "Merci d'indiquer une adresse email valide.";
        }
        if (!payload.phone) errors.phone = "Merci d'indiquer votre numéro de téléphone.";
        if (!payload.address) errors.address = "Merci d'indiquer votre adresse postale.";
        if (!payload.message) errors.message = "Merci de décrire votre besoin.";

        return errors;
      }

      form.addEventListener("submit", async function (event) {
        event.preventDefault();
        clearErrors();

        const payload = {
          first_name: value("first_name"),
          last_name: value("last_name"),
          email: value("email"),
          phone: value("phone"),
          address: value("address"),
          message: value("message")
        };
        const errors = validate(payload);

        if (Object.keys(errors).length > 0) {
          Object.keys(errors).forEach(function (name) {
            setError(name, errors[name]);
          });
          form.elements[Object.keys(errors)[0]].focus();
          showMessage("error", "Merci de corriger les champs indiqués.");
          return;
        }

        console.log("[StaticLeadForm] Donnees envoyees :", payload);
        button.disabled = true;
        button.textContent = "Envoi en cours...";

        try {
          const response = await fetch("/api/contacts", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });
          const result = await response.json();

          console.log("[StaticLeadForm] Reponse serveur :", {
            status: response.status,
            ok: response.ok,
            result
          });

          if (!response.ok || !result.success) {
            throw new Error(
              result.message || "Une erreur est survenue. Merci de réessayer dans un instant."
            );
          }

          showMessage(
            "success",
            result.message || "Merci pour votre demande. Nous vous recontactons rapidement."
          );
          form.reset();
        } catch (error) {
          console.error("[StaticLeadForm] Echec de l'envoi :", error);
          showMessage(
            "error",
            error instanceof Error
              ? error.message
              : "Une erreur est survenue. Merci de réessayer dans un instant."
          );
        } finally {
          button.disabled = false;
          button.textContent = "Envoyer la demande";
        }
      });
    </script>
  </body>
</html>
